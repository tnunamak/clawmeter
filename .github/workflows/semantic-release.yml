name: Release

on:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux tray deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libayatana-appindicator3-dev

      - run: go vet ./...
      - run: go vet -tags tray ./...
      - run: go test ./...
      - run: go test -tags tray ./...

      - name: Validate PowerShell installer syntax
        shell: pwsh
        run: |
          [scriptblock]::Create((Get-Content -Raw install.ps1)) | Out-Null
          Get-ChildItem packaging/windows -Filter *.ps1 | ForEach-Object {
            [scriptblock]::Create((Get-Content -Raw $_.FullName)) | Out-Null
          }

      - name: Validate packaging shell scripts
        run: bash -n packaging/winget/generate.sh packaging/winget/submit-pr.sh packaging/winget/close-superseded-first-package-prs.sh

  release:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      new_release: ${{ steps.semantic.outputs.new_release_published }}
      tag: ${{ steps.semantic.outputs.new_release_git_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: cycjimmy/semantic-release-action@v4
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: release
    if: needs.release.outputs.new_release == 'true'
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            cc: gcc
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
            cc: gcc
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel
            cc: clang
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            cc: clang
          - goos: windows
            goarch: amd64
            runner: windows-latest
            cc: gcc
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux tray deps
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libayatana-appindicator3-dev

      - name: Install Inno Setup
        if: matrix.goos == 'windows'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows version resource
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          .\packaging\windows\build-version-resource.ps1 -Version "${{ needs.release.outputs.tag }}"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
          CC: ${{ matrix.cc }}
        shell: bash
        run: |
          EXT=""
          LDFLAGS="-s -w -X main.Version=${{ needs.release.outputs.tag }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi
          go build -tags tray -trimpath -ldflags="$LDFLAGS" -o "clawmeter-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" ./cmd/clawmeter

      - name: Package Windows installer
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          .\packaging\windows\build-inno.ps1 `
            -BinaryPath "clawmeter-windows-amd64.exe" `
            -Version "${{ needs.release.outputs.tag }}" `
            -OutputDir "."

      - name: Package .deb and .rpm
        if: matrix.goos == 'linux'
        env:
          VERSION: ${{ needs.release.outputs.tag }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          export VERSION="${VERSION#v}"
          cp "clawmeter-linux-${GOARCH}" clawmeter
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          nfpm package -p deb -f nfpm.yaml
          nfpm package -p rpm -f nfpm.yaml
          rm clawmeter

      - uses: actions/upload-artifact@v4
        with:
          name: clawmeter-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            clawmeter-${{ matrix.goos }}-${{ matrix.goarch }}*
            ClawmeterSetup.exe
            *.deb
            *.rpm

  upload:
    needs: [release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Detect SignPath configuration
        id: signpath
        env:
          SIGNPATH_ENABLED: ${{ vars.SIGNPATH_ENABLED }}
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORGANIZATION_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          SIGNPATH_SIGNING_POLICY_SLUG: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          SIGNPATH_ARTIFACT_CONFIGURATION_SLUG: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
        run: |
          tag="${{ needs.release.outputs.tag }}"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          if [ "${SIGNPATH_ENABLED:-false}" != "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping SignPath signing because SIGNPATH_ENABLED is not true."
            exit 0
          fi
          missing=()
          for name in \
            SIGNPATH_API_TOKEN \
            SIGNPATH_ORGANIZATION_ID \
            SIGNPATH_PROJECT_SLUG \
            SIGNPATH_SIGNING_POLICY_SLUG \
            SIGNPATH_ARTIFACT_CONFIGURATION_SLUG; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::SIGNPATH_ENABLED is true but required SignPath configuration is missing: ${missing[*]}"
            exit 1
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Prepare SignPath Windows artifact
        if: steps.signpath.outputs.enabled == 'true'
        run: |
          rm -rf signpath-input signpath-output
          mkdir -p signpath-input
          cp artifacts/clawmeter-windows-amd64.exe signpath-input/
          cp artifacts/ClawmeterSetup.exe signpath-input/

      - name: Upload SignPath Windows artifact
        if: steps.signpath.outputs.enabled == 'true'
        id: upload-signpath-windows
        uses: actions/upload-artifact@v4
        with:
          name: clawmeter-windows-unsigned
          path: signpath-input/*

      - name: Submit SignPath signing request
        if: steps.signpath.outputs.enabled == 'true'
        uses: SignPath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-signpath-windows.outputs.artifact-id }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 1800
          output-artifact-directory: signpath-output
          parameters: |
            version: "${{ steps.signpath.outputs.version }}"

      - name: Replace Windows artifacts with SignPath-signed artifacts
        if: steps.signpath.outputs.enabled == 'true'
        run: |
          signed_setup="$(find signpath-output -name ClawmeterSetup.exe -type f -print -quit)"
          signed_portable="$(find signpath-output -name clawmeter-windows-amd64.exe -type f -print -quit)"
          test -n "$signed_setup"
          test -n "$signed_portable"
          cp "$signed_setup" artifacts/ClawmeterSetup.exe
          cp "$signed_portable" artifacts/clawmeter-windows-amd64.exe

      - name: Generate WinGet manifest bundle
        run: |
          tag="${{ needs.release.outputs.tag }}"
          version="${tag#v}"
          test -f artifacts/ClawmeterSetup.exe
          WINGET_ASSET_PATH="$PWD/artifacts/ClawmeterSetup.exe" packaging/winget/generate.sh "$tag"
          zip -r "artifacts/winget-manifest-${version}.zip" \
            "packaging/winget/out/manifests/t/tnunamak/Clawmeter/${version}"

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt

      - name: Add Windows distribution release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          retry_release_api() {
            for attempt in $(seq 1 12); do
              if "$@"; then
                return 0
              fi
              if [ "$attempt" -eq 12 ]; then
                return 1
              fi
              echo "GitHub release API unavailable; retrying in 15s ($attempt/12)..." >&2
              sleep 15
            done
          }
          notes="$(mktemp)"
          retry_release_api gh release view "${{ needs.release.outputs.tag }}" --repo "${{ github.repository }}" --json body --jq '.body // ""' > "$notes"
          {
            echo ""
            echo "## Windows distribution"
            echo ""
            echo "Windows artifacts are built by GitHub Actions from public repository commit \`${{ github.sha }}\`."
            echo "Verify downloaded artifacts against \`SHA256SUMS.txt\` from this release."
            if [ "${{ steps.signpath.outputs.enabled }}" = "true" ]; then
              echo "Windows \`.exe\` artifacts were signed through SignPath before checksums and WinGet metadata were generated."
            else
              echo "Windows \`.exe\` artifacts are unsigned in this release; SignPath Foundation signing is not active yet."
            fi
            echo "Code signing policy: https://github.com/${{ github.repository }}/blob/main/docs/code-signing.md"
            echo "Privacy policy: https://github.com/${{ github.repository }}/blob/main/PRIVACY.md"
          } >> "$notes"
          retry_release_api gh release edit "${{ needs.release.outputs.tag }}" --repo "${{ github.repository }}" --notes-file "$notes"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for attempt in $(seq 1 12); do
            if gh release upload "${{ needs.release.outputs.tag }}" artifacts/* --repo "${{ github.repository }}" --clobber; then
              exit 0
            fi
            if [ "$attempt" -eq 12 ]; then
              exit 1
            fi
            echo "GitHub release API unavailable; retrying in 15s ($attempt/12)..." >&2
            sleep 15
          done

  # Clean up empty release if build fails
  submit-winget:
    needs: [release, build, upload]
    if: needs.release.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Verify public Windows installer asset
        run: |
          tag="${{ needs.release.outputs.tag }}"
          url="https://github.com/${{ github.repository }}/releases/download/${tag}/ClawmeterSetup.exe"
          curl --retry 6 --retry-delay 5 --retry-all-errors -fsSL "$url" -o /tmp/ClawmeterSetup.exe
          expected="$(sha256sum artifacts/ClawmeterSetup.exe | cut -d' ' -f1)"
          actual="$(sha256sum /tmp/ClawmeterSetup.exe | cut -d' ' -f1)"
          test "$expected" = "$actual"

      - name: Generate WinGet manifest
        run: |
          tag="${{ needs.release.outputs.tag }}"
          test -f artifacts/ClawmeterSetup.exe
          WINGET_ASSET_PATH="$PWD/artifacts/ClawmeterSetup.exe" packaging/winget/generate.sh "$tag"

      - name: Submit WinGet PR
        env:
          GH_TOKEN: ${{ secrets.WINGET_PR_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::notice::Skipping WinGet PR submission because WINGET_PR_TOKEN is not configured."
            exit 0
          fi
          git config --global user.name "Tim Nunamaker"
          git config --global user.email "tnunamak@gmail.com"
          packaging/winget/submit-pr.sh "${{ needs.release.outputs.tag }}"

  cleanup:
    needs: [release, build]
    if: always() && needs.release.outputs.new_release == 'true' && needs.build.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Delete empty release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete "${{ needs.release.outputs.tag }}" --repo "${{ github.repository }}" --yes --cleanup-tag
