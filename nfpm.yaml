name: clawmeter
arch: ${GOARCH}
version: ${VERSION}
maintainer: Tim Nunamak <tim@nunamak.com>
description: Monitor AI coding assistant usage quotas
vendor: tnunamak
homepage: https://github.com/tnunamak/clawmeter
license: MIT

contents:
  - src: ./clawmeter
    dst: /usr/bin/clawmeter
  - src: ./packaging/linux/clawmeter.desktop
    dst: /usr/share/applications/clawmeter.desktop
  - src: ./assets/icon-green-1024.png
    dst: /usr/share/pixmaps/clawmeter.png
  - src: ./assets/icon-green-1024.png
    dst: /usr/share/icons/hicolor/1024x1024/apps/clawmeter.png
